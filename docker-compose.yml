version: "3.8"

# =============================================================
# MLOps Taller - Docker Compose
# Servicios:
#   1. mlflow-db       → PostgreSQL exclusivo para MLflow metadata
#   2. data-db         → PostgreSQL exclusivo para datos del modelo
#   3. minio           → Object storage para artefactos de MLflow
#   4. minio-setup     → Crea el bucket inicial en MinIO
#   5. mlflow          → MLflow Tracking Server
#   6. jupyter         → JupyterLab con todas las librerías
#   7. api             → FastAPI para inferencia
# =============================================================

services:

  # ─────────────────────────────────────────────
  # 1. Base de datos exclusiva para MLflow
  # ─────────────────────────────────────────────
  mlflow-db:
    image: postgres:15-alpine
    container_name: mlflow-db
    restart: unless-stopped # Se reinicia solo a menos que lo haya apagado manualmente.
    environment:
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: mlflow_secret
      POSTGRES_DB: mlflow_metadata
    volumes:
      - mlflow_db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlflow -d mlflow_metadata"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mlops-net

  # ─────────────────────────────────────────────
  # 2. Base de datos exclusiva para datos del modelo
  # ─────────────────────────────────────────────
  data-db:
    image: postgres:15-alpine
    container_name: data-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: datauser
      POSTGRES_PASSWORD: data_secret
      POSTGRES_DB: ml_datasets
    volumes:
      - data_db_data:/var/lib/postgresql/data
      - ./init-scripts/init_data_db.sql:/docker-entrypoint-initdb.d/init.sql # Esta carpeta hace que cualquier archivo sql se ejecute una vez al iniciar el contenedor y la base de datos no existe. Si el volumen ya existe al iniciar, no lo ejecuta.
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U datauser -d ml_datasets"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mlops-net

  # ─────────────────────────────────────────────
  # 3. MinIO — Object Storage para artefactos MLflow
  # ─────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    # Arrancamos minio como servidor y:
    # Creamos la carpeta data para persistir los artefactos.
    # Levantamos el servidor web en el port 9001
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000" # API S3
      - "9001:9001" # Consola Web
    healthcheck:
    # Puedo hacerlo sin shell porque con el binario de CMD es suficiente, no necesito un proceso extra.
    # mc es el cliente con la función ready dentro.
    # local es el alias que se le da al servicio de minio (se define en el servicio minio-setup). mc lo necesita para conectarse y además guarda las credenciales del servidor.
      test: ["CMD", "mc", "ready", "local"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s
    networks:
      - mlops-net

  # ─────────────────────────────────────────────
  # 4. MinIO Setup — Crea el bucket mlflow-artifacts
  # Esto es un contenedor de tarea, no servicio. Arranca, crea el bucket, se apaga. exit code 0.
  # ─────────────────────────────────────────────
  minio-setup:
    image: minio/mc:latest
    container_name: minio-setup
    depends_on:
      minio:
        condition: service_healthy
    # mc alias registra el servidor minio bajo el alias 'local' usando las credenciales de administrador
    # mc mb (make bucket) crea el bucket en caso de que no existe (ignore-existing)
    # mc anonymous set download establece permisos de lectura y descarga publicos en el bucket sin necesidad de credenciales.
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin123;
        mc mb --ignore-existing local/mlflow-artifacts;
        mc anonymous set download local/mlflow-artifacts;
        echo 'Bucket mlflow-artifacts creado exitosamente';
      "
    networks:
      - mlops-net
    
  # ─────────────────────────────────────────────
  # 5. MLflow Tracking Server
  # ─────────────────────────────────────────────
  mlflow:
    image: python:3.11-slim
    container_name: mlflow-server
    restart: unless-stopped
    depends_on:
      mlflow-db:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
    environment:
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin123
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    # Crea una terminal de shell
    # Instala dependencias
    # mlflow server: el servidor
    # 1. Guarde la metadata de mlflow en el postgres de mlflow
    # 2. Guarde los artefactos (modelos, archivos) en el bucket s3 de minio
    # 3. Esa definición de host esuche en todos los puertos del contenedor
    # 5. Puerto 5000 es dónde escucha el servidor
    # 6. --serve-artifacts habilita a MLFlow como proxy de artefactos.
    # MLFlow se comunica con MinIO y sirve el modelo dentro de MLFlow. Esto en lugar de tener que descargar los modelos del bucket para poder utilizarlos.
    command: >
      /bin/sh -c "
        pip install mlflow psycopg2-binary boto3 --quiet &&
        mlflow server
          --backend-store-uri postgresql://mlflow:mlflow_secret@mlflow-db:5432/mlflow_metadata
          --default-artifact-root s3://mlflow-artifacts/
          --host 0.0.0.0
          --port 5000
          --serve-artifacts
      "
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - mlops-net

  # ─────────────────────────────────────────────
  # 6. JupyterLab
  # ─────────────────────────────────────────────
  jupyter:
    build:
      context: ./jupyter
      dockerfile: Dockerfile
    container_name: jupyterlab
    restart: unless-stopped
    depends_on:
      mlflow:
        condition: service_healthy
      data-db:
        condition: service_healthy
    environment:
      MLFLOW_TRACKING_URI: http://mlflow-server:5000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin123
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      DATA_DB_URI: postgresql://datauser:data_secret@data-db:5432/ml_datasets
      JUPYTER_ENABLE_LAB: "yes"
      JUPYTER_TOKEN: "taller2026"
    volumes:
      - ./jupyter/notebooks:/home/jovyan/work
    ports:
      - "8888:8888"
    networks:
      - mlops-net

  # ─────────────────────────────────────────────
  # 7. FastAPI — Servidor de Inferencia
  # ─────────────────────────────────────────────
  api:
    build: 
      context: ./api
      dockerfile: Dockerfile
    container_name: inference-api
    restart: unless-stopped
    depends_on:
      mlflow:
        condition: service_healthy
    environment:
      MLFLOW_TRACKING_URI: http://mlflow-server:5000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin123
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    ports:
      - "8000:8000"
    networks:
      - mlops-net


# ─────────────────────────────────────────────
# Volúmenes persistentes
# ─────────────────────────────────────────────
volumes:
  mlflow_db_data:
  data_db_data:
  minio_data:

# ─────────────────────────────────────────────
# Red interna
# ─────────────────────────────────────────────
networks:
  mlops-net:
    driver: bridge

# El network es el que permite que se hablen los servicios entre si
# servicio_origen   servicio_destino      Por qué se conectan?
# mlflow-server     → mlflow-db:5432      guarda metadata de experimentos (runs, métricas, parámetros)
# mlflow-server     → minio:9000          sube los modelos y artefactos al bucket
# minio-setup       → minio:9000          crea el bucket mlflow-artifacts antes de que MLflow arranque
# jupyter           → mlflow-server:5000  registra experimentos, métricas y modelos desde el notebook
# jupyter           → data-db:5432        lee/escribe wine_raw, wine_processed y experiment_log
# api               → mlflow-server:5000  descarga el modelo en Production para hacer inferencia   
  
    
