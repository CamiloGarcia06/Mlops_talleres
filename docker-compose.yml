x-airflow-common: &airflow-common
  build: ./airflow
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@db-airflow:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    DATA_DB_HOST: db-data
    DATA_DB_PORT: 5432
    DATA_DB_USER: data_user
    DATA_DB_PASSWORD: data_pass
    DATA_DB_NAME: covertype_db
    MINIO_ENDPOINT: minio:9000
    MINIO_ACCESS_KEY: minioadmin
    MINIO_SECRET_KEY: minioadmin
    MINIO_BUCKET: models
    COVERTYPE_API_URL: http://host.docker.internal:8080
    GROUP_NUMBER: 2
  volumes:
    - ./dags:/opt/airflow/dags
  depends_on:
    db-airflow:
      condition: service_healthy
    db-data:
      condition: service_healthy
    minio:
      condition: service_healthy

services:
  db-data:
    image: postgres:15
    environment:
      POSTGRES_USER: data_user
      POSTGRES_PASSWORD: data_pass
      POSTGRES_DB: covertype_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U data_user -d covertype_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  db-airflow:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - pgdata_airflow:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: /bin/sh
    command:
      - -c
      - |
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/models
    restart: "no"

  airflow-init:
    <<: *airflow-common
    user: "0"
    entrypoint: /bin/bash
    command:
      - -c
      - |
        su -s /bin/bash airflow -c '
          airflow db migrate &&
          airflow users create \
            --username airflow \
            --password airflow \
            --firstname Admin \
            --lastname User \
            --role Admin \
            --email admin@example.com || true
        '
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: airflow webserver
    ports:
      - "8090:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    command: airflow scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  api:
    build: ./api
    ports:
      - "8989:8989"
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: models
    depends_on:
      minio:
        condition: service_healthy
    restart: unless-stopped

  jupyter:
    build: ./jupyter
    ports:
      - "8888:8888"
    environment:
      DATA_DB_HOST: db-data
      DATA_DB_PORT: 5432
      DATA_DB_USER: data_user
      DATA_DB_PASSWORD: data_pass
      DATA_DB_NAME: covertype_db
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: models
    volumes:
      - ./jupyter/notebooks:/home/jovyan/work
    depends_on:
      db-data:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata_data:
  pgdata_airflow:
  minio_data:
