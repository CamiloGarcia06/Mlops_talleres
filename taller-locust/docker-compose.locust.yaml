version: "3.8"



services:

  # ── Master: expone UI y coordina workers ───────────────────
  locust-master:
    image: locustio/locust:2.28.0
    container_name: locust-master
    ports:
      - "8089:8089"
    volumes:
      - ./locustfile.py:/mnt/locust/locustfile.py:ro
      - ./resultados:/mnt/resultados
    command: >
      -f /mnt/locust/locustfile.py
      --master
      --host http://api:8000
      --expect-workers 3
      --web-port 8089
      --csv /mnt/resultados/locust
      --csv-full-history
    networks:
      - mlops-net
    depends_on:
      - locust-worker

  # ── Workers: generan la carga real ─────────────────────────
  locust-worker:
    image: locustio/locust:2.28.0
    volumes:
      - ./locustfile.py:/mnt/locust/locustfile.py:ro
    command: >
      -f /mnt/locust/locustfile.py
      --worker
      --master-host locust-master
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
    networks:
      - mlops-net

networks:
  mlops-net:
    external: true
    name: mlops_talleres_mlops-net