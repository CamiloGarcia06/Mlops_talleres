version: '3'

tasks:
  build:
    desc: Build all Docker Compose services
    cmds:
      - docker compose build

  up:
    desc: Build and start all services
    cmds:
      - docker compose up -d --build

  down:
    desc: Stop and remove all services
    cmds:
      - docker compose down

  logs:
    desc: Tail logs from all services
    cmds:
      - docker compose logs -f

  logs:api:
    desc: Tail API logs
    cmds:
      - docker compose logs -f api

  logs:airflow:
    desc: Tail Airflow webserver and scheduler logs
    cmds:
      - docker compose logs -f airflow-webserver airflow-scheduler

  shell:api:
    desc: Shell into API container
    cmds:
      - docker compose exec api /bin/bash

  shell:airflow:
    desc: Shell into Airflow webserver container
    cmds:
      - docker compose exec airflow-webserver /bin/bash

  reload:
    desc: Reload models in the API from the shared volume
    cmds:
      - curl -s -X POST http://localhost:8989/reload | python3 -m json.tool

  health:
    desc: Check API health
    cmds:
      - curl -s http://localhost:8989/health | python3 -m json.tool

  models:
    desc: List available models in the API
    cmds:
      - curl -s http://localhost:8989/models | python3 -m json.tool

  restart:
    desc: Restart all services
    cmds:
      - docker compose restart
