version: '3'

vars:
  DATA_DB_USER: data_user
  DATA_DB_PASS: data_pass
  DATA_DB_NAME: covertype_db
  DATA_DB_PORT: 5433
  API_URL: http://localhost:8989
  AIRFLOW_URL: http://localhost:8080

tasks:
  # ── Lifecycle ──────────────────────────────────────────────
  build:
    desc: Build all Docker Compose services
    cmds:
      - docker compose build

  up:
    desc: Build and start all services
    cmds:
      - docker compose up -d

  down:
    desc: Stop and remove all services
    cmds:
      - docker compose down

  restart:
    desc: Restart all services
    cmds:
      - docker compose restart

  clean:
    desc: Stop services and remove volumes (full reset)
    prompt: This will delete all data (databases, minio, models). Continue?
    cmds:
      - docker compose down -v

  ps:
    desc: Show status of all services
    cmds:
      - docker compose ps

  # ── Logs ───────────────────────────────────────────────────
  logs:
    desc: Tail logs from all services
    cmds:
      - docker compose logs -f

  logs:api:
    desc: Tail API logs
    cmds:
      - docker compose logs -f api

  logs:airflow:
    desc: Tail Airflow webserver and scheduler logs
    cmds:
      - docker compose logs -f airflow-webserver airflow-scheduler

  # ── Shell ──────────────────────────────────────────────────
  shell:api:
    desc: Shell into API container
    cmds:
      - docker compose exec api /bin/bash

  shell:airflow:
    desc: Shell into Airflow webserver container
    cmds:
      - docker compose exec airflow-webserver /bin/bash

  shell:db:
    desc: Open psql shell in the data database
    cmds:
      - docker compose exec db-data psql -U {{.DATA_DB_USER}} -d {{.DATA_DB_NAME}}

  # ── Database ───────────────────────────────────────────────
  db:tables:
    desc: List tables in the data database
    cmds:
      - docker compose exec db-data psql -U {{.DATA_DB_USER}} -d {{.DATA_DB_NAME}} -c "\dt"

  db:count:
    desc: Show row count per batch in covertype_raw
    cmds:
      - docker compose exec db-data psql -U {{.DATA_DB_USER}} -d {{.DATA_DB_NAME}} -c "SELECT batch, COUNT(*) FROM covertype_raw GROUP BY batch ORDER BY batch;"

  db:preview:
    desc: Preview first 5 rows of covertype_training
    cmds:
      - docker compose exec db-data psql -U {{.DATA_DB_USER}} -d {{.DATA_DB_NAME}} -c "SELECT * FROM covertype_training LIMIT 5;"

  db:query:
    desc: "Run a custom SQL query (usage: task db:query -- 'SELECT ...')"
    cmds:
      - docker compose exec db-data psql -U {{.DATA_DB_USER}} -d {{.DATA_DB_NAME}} -c {{.CLI_ARGS}}

  # ── Covertype Pipeline ────────────────────────────────────
  dag:trigger:
    desc: Trigger the covertype_pipeline DAG
    cmds:
      - docker compose exec airflow-webserver airflow dags trigger covertype_pipeline

  dag:status:
    desc: Show recent runs of the covertype_pipeline DAG
    cmds:
      - docker compose exec airflow-webserver airflow dags list-runs -d covertype_pipeline --limit 10

  dag:unpause:
    desc: Unpause the covertype_pipeline DAG (starts 5-min schedule)
    cmds:
      - docker compose exec airflow-webserver airflow dags unpause covertype_pipeline

  dag:pause:
    desc: Pause the covertype_pipeline DAG
    cmds:
      - docker compose exec airflow-webserver airflow dags pause covertype_pipeline

  # ── Inference API ──────────────────────────────────────────
  health:
    desc: Check API health
    cmds:
      - curl -s {{.API_URL}}/health | python3 -m json.tool

  models:
    desc: List available models in the API
    cmds:
      - curl -s {{.API_URL}}/models | python3 -m json.tool

  reload:
    desc: Reload models in the API from MinIO
    cmds:
      - curl -s -X POST {{.API_URL}}/reload | python3 -m json.tool

  predict:
    desc: Run a sample prediction
    cmd: >-
      curl -s -X POST {{.API_URL}}/predict
      -H "Content-Type: application/json"
      -d '{"Elevation":2596,"Aspect":51,"Slope":3,"Horizontal_Distance_To_Hydrology":258,"Vertical_Distance_To_Hydrology":0,"Horizontal_Distance_To_Roadways":510,"Hillshade_9am":221,"Hillshade_Noon":232,"Hillshade_3pm":148,"Horizontal_Distance_To_Fire_Points":6279,"Wilderness_Area":"Rawah","Soil_Type":"C7744","model_name":"random_forest"}'
      | python3 -m json.tool
